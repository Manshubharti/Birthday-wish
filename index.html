<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .content {
            text-align: left;
            max-width: 500px;
            padding: 20px;
        }

        .date {
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: lighter;
            margin-bottom: 30px;
        }

        .typing-text {
            border-right: 2px solid var(--accent);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 2.8s steps(40, end) forwards, blink 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--accent) }
        }

        .message {
            opacity: 0;
            color: var(--text);
            animation: fadeIn 2s ease forwards;
            animation-delay: 4s;
            line-height: 2;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Subtle floating particle effect */
        .dot {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="toggleAudio()">

<audio id="music">
	<source src="arz.mp3" type="audio/mpeg">
</audio>

    <div class="content">
        <span class="date">9 March 2026</span>
        <h1 class="typing-text">Happy Birthday.<br>Cutie(Bobby)☺️</h1>
        <div class="message">
            Happy Birthday to someone who makes my every day a little brighter 🌸<br>
            You are my one and only favourite person😌<br>
            And i don't want to loose you😢<br>
            May your life be full of happiness, success, and beautiful moments.
            Keep smiling always 😊
        </div>
    </div>

    <script>
        // Generate subtle background dots
        for (let i = 0; i < 30; i++) {
            let dot = document.createElement('div');
            dot.className = 'dot';
            let size = Math.random() * 3 + 'px';
            dot.style.width = size;
            dot.style.height = size;
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(dot);
        }
        
        let audio = document.getElementById("music")
    	audio.currentTime = 250;
    	
    	function toggleAudio() {
    		if (audio.paused) {
    			audio.play();
    		} else {
    		   audio.pause();
    		}
    	}	
    </script>
</body>
</html>
